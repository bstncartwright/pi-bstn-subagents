name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22.19.0
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 24
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm pack --dry-run
